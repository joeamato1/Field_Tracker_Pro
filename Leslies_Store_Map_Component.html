<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #d8d8d8;
    margin: 0;
    overflow: hidden;
  }





  #modal-controls {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 0.5px solid #378ADD;
    background: #E6F1FB;
    flex-shrink: 0;
  }
  .ctrl-grp { display: flex; align-items: center; gap: 6px; }
  .ctrl-grp label { font-size: 11.5px; font-weight: 600; color: #0C447C; white-space: nowrap; }
  .ctrl-grp select {
    padding: 3px 8px;
    border: 0.5px solid #378ADD;
    border-radius: 4px;
    font-size: 11.5px;
    background: #E6F1FB;
    color: #0057A8;
    cursor: pointer;
    max-width: 160px;
  }
  .btn-clear {
    padding: 3px 10px;
    background: #E6F1FB;
    color: #0057A8;
    border: 0.5px solid #378ADD;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-clear:hover { background: #d0e8f8; }

  #modal-legend {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-left: auto;
  }
  .leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #0C447C; }
  .leg-dot { width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); }
  .ld-v  { background: #27ae60; }
  .ld-nv { background: #e74c3c; }

  #modal-stats {
    padding: 5px 16px;
    font-size: 11px;
    color: #0C447C;
    background: #E6F1FB;
    border-bottom: 0.5px solid #378ADD;
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }
  #modal-stats b { color: #0057A8; }

  #map-area {
    overflow: hidden;
    display: block;
    background: #d8d8d8;
    padding: 0;
    width: 100%;
  }
  #map-svg {
    display: block;
    width: 100%;
    height: auto;
  }

  .state {
    fill: #E6F1FB;
    stroke: #1a5070;
    stroke-width: 0.5;
  }

  #tooltip {
    position: fixed;
    background: #E6F1FB;
    border: 0.5px solid #378ADD;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    pointer-events: none;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    display: none;
    z-index: 999;
    line-height: 1.55;
    max-width: 220px;
  }
  #tooltip .tt-store { font-weight: 700; font-size: 13px; color: #0057A8; }
  #tooltip .tt-addr  { color: #0C447C; font-size: 11px; margin-top: 1px; }
  #tooltip .tt-meta  { color: #378ADD; font-size: 10.5px; margin-top: 2px; }
  .tt-badge {
    display: inline-block;
    margin-top: 5px;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10.5px;
    font-weight: 700;
    color: white;
  }
  .tb-v  { background: #27ae60; }
  .tb-nv { background: #e74c3c; }

  #map-loading { font-size: 13px; color: #0C447C; }

  @media (max-width: 540px) {
    #modal-legend { display: none; }
    #map-area { padding: 0; }
    #map-svg { transform: scale(1.2); transform-origin: top center; }
  }
</style>
</head>

// ── Map ────────────────────────────────────────────────────────────────────
let mapLoaded = false;

document.addEventListener('DOMContentLoaded', () => loadMap());
let zoomBehavior, mapGroup, svgEl;
const W = 960, H = 680;
let flyTimer = null;
let DEFAULT_TRANSFORM; // set inside loadMap once d3 is available

function loadMap() {
  DEFAULT_TRANSFORM = d3.zoomIdentity.translate(0, 0).scale(1);
  svgEl = d3.select("#map-svg");
  const excluded = new Set(["02","15"]);

  const projection = d3.geoAlbersUsa()
    .scale(920)
    .translate([W / 2, H / 2]);

  const path = d3.geoPath().projection(projection);

  // ── Single zoomable group — everything moves together ──────────────
  mapGroup = svgEl.append("g").attr("id","map-group");

  // ── D3 zoom behavior ──────────────────────────────────────────────
  zoomBehavior = d3.zoom()
    .scaleExtent([0.5, 20])
    .on("zoom", (event) => {
      mapGroup.attr("transform", event.transform);
      const k = event.transform.k;
      // Counter-scale pins so they stay the same apparent size
      d3.selectAll(".pin-outer").attr("transform", function() {
        const x = d3.select(this).attr("data-x");
        const y = d3.select(this).attr("data-y");
        return `translate(${x},${y}) scale(${1 / k})`;
      });
      // Counter-scale state labels so they stay readable at all zoom levels
      d3.selectAll("#state-labels text").attr("font-size", function() {
        const base = d3.select(this).classed("callout") ? 7.5 : 8.5;
        return base / k;
      });
      d3.selectAll("#state-labels line").attr("stroke-width", 0.5 / k);
      d3.selectAll("#state-labels circle").attr("r", 1.4 / k);
      // Counter-scale city labels
      d3.selectAll("#city-labels text").attr("font-size", 6.5 / k);
      d3.selectAll("#city-labels circle").attr("r", 1.4 / k);

    });

  svgEl.call(zoomBehavior)
    .on("dblclick.zoom", null); // disable double-click zoom to avoid conflict

  d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(us => {
    document.getElementById("map-loading").style.display = "none";
    document.getElementById("map-svg").style.display = "block";

    const allStates = topojson.feature(us, us.objects.states);
    const contiguous = {
      type: "FeatureCollection",
      features: allStates.features.filter(f => !excluded.has(f.id.toString().padStart(2,"0")))
    };

    mapGroup.append("g").selectAll("path")
      .data(contiguous.features).join("path")
      .attr("class","state").attr("d", path);

    // Interior state borders
    mapGroup.append("path")
      .datum(topojson.mesh(us, us.objects.states,
        (a,b) => a !== b &&
          !excluded.has(a.id.toString().padStart(2,"0")) &&
          !excluded.has(b.id.toString().padStart(2,"0"))))
      .attr("fill","none").attr("stroke","#0057A8")
      .attr("stroke-width", 0.4).attr("stroke-linejoin","round")
      .attr("d", path);

    // Outer border
    mapGroup.append("path")
      .datum(topojson.mesh(us, us.objects.states,
        (a,b) => a === b && !excluded.has(a.id.toString().padStart(2,"0"))))
      .attr("fill","none").attr("stroke","#0057A8")
      .attr("stroke-width", 1.4).attr("stroke-linejoin","round")
      .attr("d", path);

    // ── State labels (store states only, EC callouts with hardcoded centroids) ──
    const fipsToAbbr = {
      "01":"AL","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT","10":"DE",
      "12":"FL","13":"GA","16":"ID","17":"IL","18":"IN","19":"IA","20":"KS",
      "21":"KY","22":"LA","23":"ME","24":"MD","25":"MA","26":"MI","27":"MN",
      "28":"MS","29":"MO","30":"MT","31":"NE","32":"NV","33":"NH","34":"NJ",
      "35":"NM","36":"NY","37":"NC","38":"ND","39":"OH","40":"OK","41":"OR",
      "42":"PA","44":"RI","45":"SC","46":"SD","47":"TN","48":"TX","49":"UT",
      "50":"VT","51":"VA","53":"WA","54":"WV","55":"WI","56":"WY"

    const storeStates = new Set([

        .attr("d","M0,-8 C-4.5,-8 -7.5,-5 -7.5,-1.5 C-7.5,3 0,8 0,8 C0,8 7.5,3 7.5,-1.5 C7.5,-5 4.5,-8 0,-8 Z")

      g.append("circle").attr("r", 1.8).attr("cy", -1.5)

    mapLoaded = true;

    window.parent.postMessage({action:'MAP_READY'}, '*');

  }).catch(() => {
    document.getElementById("map-loading").textContent = "Map failed to load. Check your connection.";
  });
}

// ── Animated fly-to ────────────────────────────────────────────────────────
function flyToVisible() {
  if (!mapLoaded || !svgEl) return;

  // Collect SVG coords of all visible pins
  const pts = [];
  d3.selectAll(".pin-outer").each(function() {
    if (d3.select(this).style("display") !== "none") {
      pts.push([
        +d3.select(this).attr("data-x"),
        +d3.select(this).attr("data-y")
      ]);
    }
  });

  // No visible pins or "all stores" — fly back to default USA view
  const isAllFilters =
    !document.getElementById("f-territory").value &&
    !document.getElementById("f-district").value  &&
    !document.getElementById("f-status").value;

  if (pts.length === 0 || isAllFilters) {
    svgEl.transition().duration(750).ease(d3.easeCubicInOut)
      .call(zoomBehavior.transform, DEFAULT_TRANSFORM);
    return;
  }

  // Compute bounding box of visible pins in SVG coordinate space
  const xs = pts.map(p => p[0]);
  const ys = pts.map(p => p[1]);
  const x0 = Math.min(...xs), x1 = Math.max(...xs);
  const y0 = Math.min(...ys), y1 = Math.max(...ys);

  const bw = x1 - x0 || 40;
  const bh = y1 - y0 || 40;

  // D3 zoom transforms operate in SVG viewBox coordinate space (960x680)
  // regardless of how the SVG scales on screen — so always use W and H here
  const svgW = W;
  const svgH = H;

  // Padding as fraction of bounding box
  const pad = 0.32;
  const scaleX = svgW / (bw * (1 + pad * 2));
  const scaleY = svgH / (bh * (1 + pad * 2));

  // Cap zoom: min 1, max 6
  const scale = Math.min(Math.max(Math.min(scaleX, scaleY), 1), 6);

  const cx = (x0 + x1) / 2;
  const cy = (y0 + y1) / 2;
  const tx = svgW / 2 - scale * cx;
  const ty = svgH / 2 - scale * cy;

  svgEl.transition().duration(750).ease(d3.easeCubicInOut)
    .call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function onTerritoryChange() {
  const t = document.getElementById("f-territory").value;
  const dSel = document.getElementById("f-district");
  const prev = dSel.value;
  dSel.innerHTML = '<option value="">All</option>';
  const districts = t ? districtsByTerritory[t] : Object.values(districtsByTerritory).flat().sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1)));
  districts.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d; opt.textContent = districtNames[d] ? d + " - " + districtNames[d] : d;
    if (d === prev) opt.selected = true;
    dSel.appendChild(opt);
  });
  applyFilters();
}

// ── Filters + debounced fly-to ─────────────────────────────────────────────
function applyFilters() {
  const fTerritory = document.getElementById("f-territory").value;
  const fDistrict  = document.getElementById("f-district").value;
  const fStatus    = document.getElementById("f-status").value;
  let showing = 0, vis = 0, notVis = 0;

  d3.selectAll(".pin-outer").each(function() {
    const el = d3.select(this);
    const show =
      (!fTerritory || el.attr("data-territory") === fTerritory) &&
      (!fDistrict  || el.attr("data-district")  === fDistrict)  &&
      (!fStatus    || el.attr("data-visited")    === fStatus);
    el.style("display", show ? null : "none");
    if (show) { showing++; el.attr("data-visited") === "visited" ? vis++ : notVis++; }
  });

  const _ss=document.getElementById("s-show");if(_ss)_ss.textContent=showing;
  const _sv=document.getElementById("s-vis");if(_sv)_sv.textContent=vis;
  const _sn=document.getElementById("s-not");if(_sn)_sn.textContent=notVis;

  // Debounce fly-to so rapid filter changes don't stack animations
  if (flyTimer) clearTimeout(flyTimer);
  flyTimer = setTimeout(flyToVisible, 120);
}

function resetFilters() {
  document.getElementById("f-territory").value = "";
  document.getElementById("f-status").value    = "";
  onTerritoryChange(); // rebuilds district dropdown then calls applyFilters
}

window.addEventListener('message', function(e) {
  if (!e.data || e.data.action !== 'INJECT_VISITS') return;
  var visited = new Set((e.data.visitedIds || []).map(String));
  var pins = Array.from(document.querySelectorAll('.pin-outer'));
  stores.forEach(function(s, i) {
    s.visited = visited.has(String(s.id));
    if (!pins[i]) return;
    var path = pins[i].querySelector('path');
    if (!path) return;
    path.setAttribute('fill', s.visited ? '#27ae60' : '#e74c3c');
    path.setAttribute('stroke', s.visited ? '#1a7a42' : '#b03030');
    pins[i].setAttribute('data-visited', s.visited ? 'visited' : 'not');
  });
  if (e.data.filterTerritory) {
    var te = document.getElementById('f-territory');
    if (te) { te.value = e.data.filterTerritory; onTerritoryChange(); return; }
  }
  if (e.data.hideFilters) {
    var te = document.getElementById('f-territory');
    var de = document.getElementById('f-district');
    if (te && te.closest('.ctrl-grp')) te.closest('.ctrl-grp').style.display = 'none';
    if (de && de.closest('.ctrl-grp')) de.closest('.ctrl-grp').style.display = 'none';
  }
  applyFilters();
});
